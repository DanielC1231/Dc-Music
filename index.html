<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DC Music</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Barra Lateral -->
        <aside class="sidebar">
            <div class="logo">DC Music</div>
            <ul class="menu">
                <li>🏠 Inicio</li>
                <li>🔍 Buscar</li>
                <li>📚 Tu Biblioteca</li>
            </ul>
        </aside>

        <!-- Contenido Principal -->
        <main class="main-content">
            <header class="header">
                <h2>Buenos Días</h2>
            </header>
            <div class="songs" id="songList"></div>
        </main>
    </div>

    <!-- Barra de Reproducción Inferior -->
    <div class="player">
        <div class="player-left">
            <div id="currentTitle">Selecciona una canción</div>
            <div id="currentArtist">-</div>
        </div>
        <div class="player-center">
            <button onclick="prevSong()">⏮</button>
            <button id="playBtn" onclick="playSong()">▶</button>
            <button onclick="nextSong()">⏭</button>
            <input type="range" id="progress" value="0" min="0" max="100">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
