<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DC Music</title>
    <!-- Favicon (logo en la pestaña) -->
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Barra Lateral Interactiva -->
        <aside class="sidebar">
            <div class="logo">
                <img src="img/logo.png" alt="DC Music" class="logo-img">
                <span>DC Music</span>
            </div>
            <ul class="menu">
                <li id="menu-inicio" class="active" onclick="changeSection('inicio')">🏠 Inicio</li>
                <li id="menu-descargas" onclick="changeSection('descargas')">📥 Descargas</li>
            </ul>
        </aside>

        <!-- Contenido Principal -->
        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <img src="img/logo.png" alt="DC Music" class="header-logo-img">
                    <h2 id="sectionTitle">Buenos Días</h2>
                </div>
                <div class="header-right">
                    <span class="song-counter" id="songCounter">0 canciones</span>
                </div>
            </header>
            
            <!-- Contenedor dinámico de canciones -->
            <div class="songs" id="songList"></div>
        </main>
    </div>

    <!-- Barra de Reproducción Inferior -->
    <div class="player">
        <div class="player-left">
            <div id="currentTitle">Selecciona una canción</div>
            <div id="currentArtist">-</div>
        </div>
        <div class="player-center">
            <div class="controls">
                <button onclick="prevSong()">⏮</button>
                <button id="playBtn" onclick="playSong()">▶</button>
                <button onclick="nextSong()">⏭</button>
                <button id="downloadBtn" onclick="downloadCurrentSong()" style="font-size: 16px; margin-left: 15px; color: #1DB954;" title="Descargar canción">📥</button>
            </div>
            <input type="range" id="progress" value="0" min="0" max="100">
        </div>
        <div class="player-right">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
