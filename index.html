<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DC Music</title>
    
    <!-- ===== METADATOS PWA ===== -->
    <meta name="theme-color" content="#1DB954">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DC Music">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- ===== FAVICON ===== -->
    <link rel="icon" type="image/png" href="img/logo.png">
    
    <!-- ===== ICONOS PARA PWA ===== -->
    <link rel="apple-touch-icon" href="img/logo-192x192.png">
    <link rel="apple-touch-icon" sizes="192x192" href="img/logo-192x192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="img/logo-512x512.png">
    
    <!-- ===== MANIFEST ===== -->
    <link rel="manifest" href="manifest.json">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Barra Lateral Interactiva -->
        <aside class="sidebar">
            <div class="logo">
                <img src="img/logo.png" alt="DC Music" class="logo-img">
                <span>DC Music</span>
            </div>
            <ul class="menu">
                <li id="menu-inicio" class="active" onclick="changeSection('inicio')">🏠 Inicio</li>
                <li id="menu-descargas" onclick="changeSection('descargas')">📥 Descargas</li>
            </ul>
        </aside>

        <!-- Contenido Principal -->
        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <img src="img/logo.png" alt="DC Music" class="header-logo-img">
                    <h2 id="sectionTitle">Buenos Días</h2>
                </div>
                <div class="header-right">
                    <span class="song-counter" id="songCounter">0 canciones</span>
                </div>
            </header>
            
            <!-- Contenedor dinámico de canciones -->
            <div class="songs" id="songList"></div>
        </main>
    </div>

    <!-- Barra de Reproducción Inferior -->
    <div class="player">
        <div class="player-left">
            <div id="currentTitle">Selecciona una canción</div>
            <div id="currentArtist">-</div>
        </div>
        <div class="player-center">
            <div class="controls">
                <button onclick="prevSong()">⏮</button>
                <button id="playBtn" onclick="playSong()">▶</button>
                <button onclick="nextSong()">⏭</button>
                <button id="downloadBtn" onclick="downloadCurrentSong()" style="font-size: 16px; margin-left: 15px; color: #1DB954;" title="Descargar canción">📥</button>
            </div>
            <input type="range" id="progress" value="0" min="0" max="100">
        </div>
        <div class="player-right">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
        </div>
    </div>

    <!-- ==========================================
         REGISTRAR SERVICE WORKER PARA MODO OFFLINE
         ========================================== -->
    <script>
        // Registrar el Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then((registration) => {
                    console.log('✅ Service Worker registrado');
                })
                .catch((error) => {
                    console.log('❌ Error al registrar Service Worker:', error);
                });
        }
    </script>

    <script src="script.js"></script>
</body>
</html>
